services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    ports:
      - "5432:5432"
    shm_size: 1g
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
volumes:
  pgdata: