info:
  name: add attendee
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/events/{{eventId}}/attendees"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "Andi",
        "role": "Engineer",
        "skills": ["nestjs", "ai"],
        "lookingFor": "Mencari partner diskusi AI",
        "openToChat": true
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
