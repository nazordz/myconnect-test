info:
  name: create event
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/events"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "name": "MyConnect AI Day"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
