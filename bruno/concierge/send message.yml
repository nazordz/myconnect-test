info:
  name: send concierge message
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/events/{{eventId}}/concierge/messages"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "attendee_id": "{{attendeeId}}",
        "message": "Cari peserta yang cocok untuk diskusi AI"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
