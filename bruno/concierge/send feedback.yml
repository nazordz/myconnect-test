info:
  name: send feedback
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/events/{{eventId}}/concierge/messages/{{messageId}}/feedback"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "rating": 5,
        "notes": "Rekomendasinya relevan"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
